$(document).ready(function(){
    const $container = $('#js-gallery-grid');
    let allGroups = [];

    // ১. ডাটা জেনারেট করা
    galleryConfig.forEach((item, index) => {
        const uniqueID = "group-" + index; // প্রতিটি কার্ডের জন্য চিরস্থায়ী ইউনিক আইডি
        
        let groupHTML = `
            <div class="col-md-3 col-sm-6 col-xs-6 gallery-item main-card ${item.category}">
                <a href="${item.main}" data-lightbox="${uniqueID}" data-title="${item.title}">
                    <div class="img-container">
                        <img src="${item.main}" class="img-responsive">
                        <div class="hover-overlay"><i class="fa fa-plus"></i></div>
                    </div>
                </a>`;
        
        // রিলেটেড ইমেজগুলোকেও একই uniqueID তে রাখা হলো
        item.related.forEach((path) => {
            groupHTML += `<a href="${path}" data-lightbox="${uniqueID}" data-title="${item.title}" class="hidden-item"></a>`;
        });

        groupHTML += `</div>`;
        allGroups.push(groupHTML);
    });

    // ২. র্যান্ডম শাফেল (Shuffle) - এটি শুধু "All" ট্যাবের শুরুর সজ্জা ঠিক করবে
    for (let i = allGroups.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allGroups[i], allGroups[j]] = [allGroups[j], allGroups[i]];
    }

    $container.append(allGroups.join(''));

    // ৩. Isotope ইনিশিয়ালাইজ
    var $grid = $container.imagesLoaded(function() {
        $grid.isotope({
            itemSelector: '.main-card',
            layoutMode: 'fitRows'
        });
    });

    // ৪. ফিল্টার বাটন লজিক (এখানে স্লাইড লজিক আর বদলাতে হবে না)
    $('.filter-btn').on('click', function() {
        $('.filter-btn').removeClass('active');
        $(this).addClass('active');
        const f = $(this).attr('data-filter');
        const filterValue = (f === '*') ? '.main-card' : '.main-card.' + f;
        $grid.isotope({ filter: filterValue });
    });

    // Lightbox Settings
    lightbox.option({ 
        'resizeDuration': 0, 
        'fadeDuration': 200, 
        'wrapAround': true,
        'disableScrolling': false 
    });
});
</script>
